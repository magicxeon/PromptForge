<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AAA Character Generator</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
<header>
<h1>AAA Character Generator</h1>
<p>Generate AAA Game Style Character Prompts</p>
</header>

<section class="panel controls">
<div class="row">
<label>Rank</label>
<select id="rankFilter">
<option value="">Random</option>
<option>S</option><option>A</option><option>B</option>
<option>C</option><option>D</option><option>E</option>
</select>

<label>Style</label>
<select id="styleFilter">
<option value="">Random</option>
<option value="3D Game">3D Game</option>
<option value="Realistic">Realistic</option>
<option value="Premium Hero Illustration">Premium Hero Illustration</option>
<option value="Anime-Inspired Realism">Anime-Inspired Realism</option>
<option value="Cinematic 2D Animation">Cinematic 2D Animation</option>
<option value="Cyberpunk Concept Art">Cyberpunk Concept Art</option>
<option value="Dark Fantasy Oil Painting">Dark Fantasy Oil Painting</option>
<option value="Retro Pixel Art">Retro Pixel Art</option>
<option value="Chibi Cute Style">Chibi Cute Style</option>
<option value="Comic Book Art">Comic Book Art</option>
<option value="Watercolor Illustration">Watercolor Illustration</option>
<option value="Gothic Horror Art">Gothic Horror Art</option>
<option value="Pop Art Retro">Pop Art Retro</option>
<option value="Steampunk Vintage">Steampunk Vintage</option>
</select>

<button id="generateBtn">Generate</button>
<button id="copyBtn">Copy Prompt</button>
<button id="exportBtn">Export JSON</button>
</div>
</section>

<div class="grid">
<section class="panel">
<h2>Character</h2>
<pre id="characterInfo">Press Generate...</pre>
</section>

<section class="panel">
<h2>Prompt</h2>
<textarea id="promptOutput" spellcheck="false"></textarea>
</section>
</div>

<footer>
<small>AAA Character Generator v0.1</small>
</footer>
</div>

<div id="app-dialog-modal" class="app-dialog-modal" style="display:none" role="dialog" aria-modal="true"
aria-labelledby="app-dialog-title" aria-describedby="app-dialog-message">
  <div class="app-dialog-card" tabindex="-1">
    <div class="app-dialog-header">
      <div><span id="app-dialog-kicker">MODEL PROMPT FORGE</span><h3 id="app-dialog-title">Notice</h3></div>
      <button id="app-dialog-close" type="button" aria-label="Close dialog">&times;</button>
    </div>
    <p id="app-dialog-message"></p>
    <label id="app-dialog-input-field" class="app-dialog-field" hidden>
      <span id="app-dialog-input-label">Value</span><input id="app-dialog-input" type="text" maxlength="1000">
    </label>
    <label id="app-dialog-select-field" class="app-dialog-field" hidden>
      <span id="app-dialog-select-label">Choose an option</span><select id="app-dialog-select"></select>
    </label>
    <p id="app-dialog-error" role="alert"></p>
    <div class="app-dialog-actions">
      <button id="app-dialog-cancel" type="button">Cancel</button>
      <button id="app-dialog-confirm" type="button">OK</button>
    </div>
  </div>
</div>

<script src="/app-dialog.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
